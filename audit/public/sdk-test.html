<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>AgentAd SDK test</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background:#f1f5f9; padding:32px; }
    .page { display: grid; grid-template-columns: 1fr 320px; gap: 24px; max-width: 1100px; margin: 0 auto; }
    .article { background:#fff; padding:24px; border-radius:12px; }
    .rail { display:flex; flex-direction:column; gap:16px; }
    .slot { background:#fff; border-radius:12px; overflow:hidden; border:1px solid #e2e8f0; }
    .label { padding:8px 12px; background:#f8fafc; border-bottom:1px solid #e2e8f0; font-size:10px; color:#94a3b8; text-transform:uppercase; }
    #log { background:#0f172a; color:#a7f3d0; padding:12px; font-family:ui-monospace,Menlo,monospace; font-size:11px; border-radius:8px; max-height:300px; overflow:auto; }
    input, select { padding:6px; font-size:12px; border:1px solid #cbd5e1; border-radius:6px; margin-right:6px; }
  </style>
</head>
<body>
  <h2>AgentAd SDK integration test</h2>

  <p style="margin-bottom:16px;">
    Manifest ID:
    <input id="mf" value="c195b9dfaeb56a4b9aceea3d2" size="28" />
    failMode:
    <select id="failmode">
      <option value="closed">closed</option>
      <option value="open">open</option>
    </select>
    <button onclick="remount()">Remount</button>
  </p>

  <div class="page">
    <div class="article">
      <h3>Simulated publisher article</h3>
      <p>Some content… the SDK renders the ad in the rail.</p>
    </div>
    <div class="rail">
      <div class="slot">
        <div class="label">Sponsored</div>
        <div id="agentad-ad-slot" style="min-height:200px;"></div>
      </div>
      <pre id="log"></pre>
    </div>
  </div>

  <script src="/agentad-sdk.js"></script>
  <script>
    const BACKEND = 'http://localhost:8080';
    let handle = null;
    const log = (msg, data) => {
      const el = document.getElementById('log');
      el.textContent += '[' + new Date().toLocaleTimeString() + '] ' + msg + (data ? ' ' + JSON.stringify(data, null, 2) : '') + '\n';
      el.scrollTop = el.scrollHeight;
    };

    function remount() {
      if (handle) handle.destroy();
      const id = document.getElementById('mf').value.trim();
      const failMode = document.getElementById('failmode').value;
      log('mounting manifestUrl=' + BACKEND + '/api/manifests/' + id + ' failMode=' + failMode);
      handle = AgentAdSDK.mount({
        container: '#agentad-ad-slot',
        manifestUrl: BACKEND + '/api/manifests/' + id,
        verifyMode: 'api-first',
        badgePosition: 'top-right',
        failMode: failMode,
        onVerified: r => log('onVerified', { decision: r.decision, status: r.verify.status }),
        onMismatch: r => log('onMismatch', { status: r.verify.status }),
        onExpired:  r => log('onExpired',  { status: r.verify.status }),
      });
    }

    remount();
  </script>
</body>
</html>
